services:

  # ── Reverse proxy + landing page ──────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "2346:80"
    depends_on:
      - vibe-coder
    restart: unless-stopped

  # ── Vibe Coder ─────────────────────────────────────────────
  vibe-coder:
    build:
      context: ../vibe-coder
      dockerfile: Dockerfile
    depends_on:
      vibe-db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://vibecoder:vibecoder@vibe-db:5432/vibecoder"
      POSTGRES_PRISMA_URL: "postgresql://vibecoder:vibecoder@vibe-db:5432/vibecoder"
      POSTGRES_URL_NON_POOLING: "postgresql://vibecoder:vibecoder@vibe-db:5432/vibecoder"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:2346/vibe-coder}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      FAL_KEY: "${FAL_KEY:-}"
      NODE_ENV: "production"
    restart: unless-stopped

  # ── PostgreSQL voor Vibe Coder ─────────────────────────────
  vibe-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vibecoder
      POSTGRES_USER: vibecoder
      POSTGRES_PASSWORD: vibecoder
    volumes:
      - vibe_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibecoder"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  vibe_db_data:
