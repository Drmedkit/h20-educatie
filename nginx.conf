server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/css application/javascript text/html application/json;

    # ── Vibe Coder (/vibe-coder/* → vibe-coder:3000/*) ──────
    # ^~ betekent: als dit match, geen regex-locaties meer proberen
    location = /vibe-coder {
        return 302 /vibe-coder/login;
    }

    location ^~ /vibe-coder/ {
        rewrite ^/vibe-coder(/.*)$ $1 break;
        proxy_pass http://vibe-coder:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect http://vibe-coder:3000/ /vibe-coder/;
        proxy_redirect / /vibe-coder/;
    }

    # ── Landing page (statische bestanden) ──────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
